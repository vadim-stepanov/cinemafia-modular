services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cinemafia
      POSTGRES_USER: cinemafia
      POSTGRES_PASSWORD: dev
    # Host port 5443 (distinct per repo so sibling projects can coexist);
    # container stays on 5432. DATABASE_URL → ...@localhost:5443/cinemafia
    ports: ["5443:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinemafia -d cinemafia"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
